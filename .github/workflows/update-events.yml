name: Update connpass events

on:
  schedule:
  - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update events.json from connpass
        env:
          CONNPASS_API_KEY: ${{ secrets.CONNPASS_API_KEY }}
          CONNPASS_SERIES_ID: ${{ secrets.CONNPASS_SERIES_ID }}
        run: node scripts/update-events.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/events.json
          git diff --cached --quiet || git commit -m "Update connpass events"
          git push
