name: Update connpass events

on:
  schedule:
    # 1時間ごとに自動更新
    - cron: "0 * * * *"

  # 手動実行も可能
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest

    steps:
      # リポジトリを取得
      - name: Checkout repository
        uses: actions/checkout@v4

      # Node.jsをセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # connpassからイベント取得
      - name: Update events.json from connpass
        env:
          CONNPASS_API_KEY: ${{ secrets.CONNPASS_API_KEY }}
          CONNPASS_SERIES_ID: ${{ vars.CONNPASS_SERIES_ID }}
        run: node scripts/update-events.mjs

      # 変更があればコミット
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/events.json
          git diff --cached --quiet || git commit -m "Auto update connpass events"
          git push
